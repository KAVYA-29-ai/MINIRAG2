name: Dependency Review

on:
  pull_request:
    branches: [ main ]

jobs:
  dependency-review:
    name: Scan for vulnerable dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
